scaler: Standard
resample: 1 #if 0<resample<1 then it is ratio to keep, else it needs to be an integer representing the number of sample to keep
test_size : 0.2
seed_split: 42

poly_features_enabled: True
poly_features_degree: 1

rp_enabled: False #random projection
rp_components_rate : 1
rp_n_components: 100 #only used if rp_components_rate is 0

rff_enabled : False #random fourier features
rff_components_rate : 1
rff_n_components: 100 #only used if rp_components_rate is 0