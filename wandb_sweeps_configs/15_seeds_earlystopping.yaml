method: grid
name: 5_Higgs_BigBMLP_EarlyStopping_Adam
metric:
  goal: maximize
  name: validation/accuracy
parameters:
  seed:
    values:

      - 42
      - 43
      - 44
      - 45
      - 46
  loss:
    values:
      - {type: normal, alpha: 0.05}
  model:
    values:
  #    - {model_type: BPreActResNet}
  #    - {model_type: LogisticRegression}
  #    - {model_type: BMLP, hidden_layers: [100, 30], dropout: 0.0, single_output: True}
      - {model_type: BMLP, hidden_layers: [150,1000,150, 30], dropout: 0.0, single_output: True}
  trainer.callbacks:
    values:
      - {early_stop_enable: True, patience: 5}
  preprocessor:
    values:
      - {poly_features_degree: 1, resample: 1}