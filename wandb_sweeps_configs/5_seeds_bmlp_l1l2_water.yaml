method: grid
name: 5_WATER_BMLP_L1L2
metric:
  goal: maximize
  name: validation/accuracy
parameters:
  seed:
    values:
      - 42
      - 43
      - 44
      - 45
      - 46
  loss:
    values:
      - {type: l1normal, alpha: 0.0012708519297240145}
      - {type: l2normal, alpha: 0.0023129408661255696}
  estimator:
    values:
      - {reg_coef: 0.1}
  model:
    values:
      - {model_type: BMLP, hidden_layers: [1000, 100, 10], dropout: 0.0, single_output: True}
  preprocessor:
    values:
      - {poly_features_degree: 6, resample: 1}