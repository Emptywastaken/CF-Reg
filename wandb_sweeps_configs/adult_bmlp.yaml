method: grid
name: Adult_BMLP_SCFE
metric:
  goal: maximize
  name: validation/accuracy
parameters:
  loss:
    values:
      - {type: normal, alpha: 0.00001}
  estimator:
    values:
      - {reg_coef: 2.285}
  model:
    values:
      - {model_type: BMLP, hidden_layers: [1000, 100, 10], dropout: 0.2014, single_output: True}
  preprocessor:
    values:
      - {poly_features_degree: 1, resample: 1}