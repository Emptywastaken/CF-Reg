method: grid
name: counterfactual_overfitting
metric:
  goal: maximize
  name: validation/accuracy
parameters:
  radius:
    values: [1.0, 0.1, 0.01, 0.001, 0.0001, 0.00001]
  n_samples:
    values: [10, 100, 1000]
  # batch_size:
  #   values: [32, 64, 128, 256]
  lr:
    values: [0.1, 0.01, 0.001, 0.0001, 0.00001, 0.000001]
  alpha:
    values: [0.01, 0.1, 0.2, 0.5, 0.7, 0.9]
  distribution:
    values: ["uniform", "normal"]