method: bayes
name: CIFAR10_ResNet_L1_Bayes_adam
metric:
  goal: maximize
  name: validation/accuracy
parameters:
  loss.alpha:  # `alpha` nested under `loss`
    distribution: uniform
    min: 0.0000001
    max: 0.001
  model:
    values:
      - {model_type: BPreActResNet}
  preprocessor:
    values:
      - {poly_features_degree: 1, resample: 1}
early_terminate:
  type: hyperband
  max_iter: 150