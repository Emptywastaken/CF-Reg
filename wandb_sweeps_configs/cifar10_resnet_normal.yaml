method: grid
name: CIFAR10_ResNet_Normal
metric:
  goal: maximize
  name: validation/accuracy
parameters:
  loss:
    values:
      - {type: normal, alpha: 0.00001}
  estimator:
    values:
      - {type: scfe, reg_coef: 0.1}
  model:
    values:
      - {model_type: BPreActResNet}
  preprocessor:
    values:
      - {poly_features_degree: 1, resample: 1}
early_terminate:
  type: hyperband
  max_iter: 150