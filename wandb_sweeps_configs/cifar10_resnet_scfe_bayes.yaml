method: bayes
name: CIFAR10_ResNet_SCFE_Bayes_adam_low_alpha
metric:
  goal: maximize
  name: validation/accuracy
parameters:
  loss.alpha:  # `alpha` nested under `loss`
    distribution: uniform
    min: -0.001
    max: -0.00000001
  estimator.reg_coef.value:  # `reg_coef` nested under `estimator`
    distribution: uniform
    min: 0.00001
    max: 0.8
  model:
    values:
      - {model_type: BPreActResNet}
  preprocessor:
    values:
      - {poly_features_degree: 1, resample: 1}
early_terminate:
  type: hyperband
  max_iter: 150