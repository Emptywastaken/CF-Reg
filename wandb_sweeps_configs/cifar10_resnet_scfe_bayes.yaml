method: bayes
name: CIFAR10_ResNet_SCFE_Bayes
metric:
  goal: maximize
  name: validation/accuracy
parameters:
  loss.aggr_func.type: 
    values:
      - tp_tn_mean
  loss.alpha:  # `alpha` nested under `loss`
    distribution: uniform
    min: -1.0
    max: -0.000001
  estimator.reg_coef:  # `reg_coef` nested under `estimator`
    values:
      - {rc_type: 'optim'}
  model:
    values:
      - {model_type: BPreActResNet}
  preprocessor:
    values:
      - {poly_features_degree: 1, resample: 1}
early_terminate:
  type: hyperband
  max_iter: 150