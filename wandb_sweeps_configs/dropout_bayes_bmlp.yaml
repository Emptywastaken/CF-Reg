method: bayes
name: Higgs_BigBMLP_Dropout_Bayes_Adam
metric:
  goal: maximize
  name: validation/accuracy
parameters:
  model.dropout:  # `alpha` nested under `loss`
    distribution: uniform
    min: 0.0
    max: 0.9
  model:
    values:
    - {model_type: BMLP, hidden_layers: [150,1000,150,30], single_output: True}
    #- {model_type: BMLP, hidden_layers: [100,30], single_output: True}
      
  preprocessor:
    values:
      - {poly_features_degree: 1, resample: 1}
early_terminate:
  type: hyperband
  max_iter: 150