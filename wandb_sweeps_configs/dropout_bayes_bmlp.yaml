method: bayes
name: Phomene_BMLP_Dropout_Bayes
metric:
  goal: maximize
  name: validation/accuracy
parameters:
  model.dropout:  # `alpha` nested under `loss`
    distribution: uniform
    min: 0.0
    max: 0.9
  model:
    values:
      - {model_type: BMLP, hidden_layers: [100,40], single_output: True}
  preprocessor:
    values:
      - {poly_features_degree: 1, resample: 1}
early_terminate:
  type: hyperband
  max_iter: 150