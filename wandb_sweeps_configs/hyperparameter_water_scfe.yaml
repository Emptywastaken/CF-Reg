method: grid
name: Hyperparams_WATER_BMLP_SCFE
metric:
  goal: maximize
  name: validation/accuracy
parameters:
  loss:
    values:
      - {type: scfe_regularization, alpha: -0.0001}
      - {type: scfe_regularization, alpha: -0.001}
      - {type: scfe_regularization, alpha: -0.01}
      - {type: scfe_regularization, alpha: -0.1}
      - {type: scfe_regularization, alpha: -0.5}
      - {type: scfe_regularization, alpha: -1}
  estimator:
    values:
      - {reg_coef: 0.1}
      - {reg_coef: 0.5}
      - {reg_coef: 1}
      - {reg_coef: 1.5}
      - {reg_coef: 2}
      - {reg_coef: 2.5}
  model:
    values:
      - {model_type: BMLP, hidden_layers: [1000, 100, 10], dropout: 0.0, single_output: True}
  preprocessor:
    values:
      - {poly_features_degree: 1, resample: 1}