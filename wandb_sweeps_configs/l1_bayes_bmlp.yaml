method: bayes
name: Higgs_BigBMLP_L1_Bayes_Adam
metric:
  goal: maximize
  name: validation/accuracy
parameters:
  loss.alpha:  # `alpha` nested under `loss`
    distribution: uniform
    min: 0.00001
    max: 1.0
  model:
    values:
      - {model_type: BMLP, hidden_layers: [150,1000,150,30], dropout: 0.0, single_output: True}
   # - {model_type: BMLP, hidden_layers: [100,30], dropout: 0.0, single_output: True}

  preprocessor:
    values:
      - {poly_features_degree: 1, resample: 1}
early_terminate:
  type: hyperband
  max_iter: 150