method: bayes
name: IONO_LogReg_L1_Bayes
metric:
  goal: maximize
  name: validation/accuracy
parameters:
  loss.alpha:  # `alpha` nested under `loss`
    distribution: uniform
    min: 0.000001
    max: 1
  model:
    values:
      - {model_type: LogisticRegression}
  preprocessor:
    values:
      - {poly_features_degree: 2, resample: 1}
early_terminate:
  type: hyperband
  max_iter: 150