method: bayes
name: ADULT_BMLP_SCFE_Bayes
metric:
  goal: maximize
  name: validation/accuracy
parameters:
  loss.aggr_func.type: 
    values:
      - montecarlo_vcp_weighted_mean
  loss.aggr_func.radius:
    distribution: uniform
    min: 1.0
    max: 100.0
  loss.alpha:  # `alpha` nested under `loss`
    distribution: uniform
    min: -1.0
    max: -0.00001
  estimator.reg_coef:  # `reg_coef` nested under `estimator`
    distribution: uniform
    min: 0.01
    max: 2.5
  model:
    values:
      - {model_type: BMLP, hidden_layers: [100, 30], dropout: 0.0, single_output: True}
  preprocessor:
    values:
      - {poly_features_degree: 1, resample: 1}
early_terminate:
  type: hyperband
  max_iter: 150