method: bayes
name: Phomene_LogReg_SCFE_Bayes_Adam_Basso_Basso_Basso
metric:
  goal: maximize
  name: validation/accuracy
parameters:
  loss.alpha:  # `alpha` nested under `loss`
    distribution: uniform
    min: -0.0001
    max: -0.000000001
  estimator.reg_coef.value:  # `reg_coef` nested under `estimator`
    distribution: uniform
    min: 0.00000001
    max: 0.15
  model:
    values:
      - {model_type: LogisticRegression}
  preprocessor:
    values:
      - {poly_features_degree: 11, resample: 1}
early_terminate:
  type: hyperband
  max_iter: 150