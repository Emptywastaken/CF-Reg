method: grid
name: WATER_LogReg_SCFE
metric:
  goal: maximize
  name: validation/accuracy
parameters:
  loss:
    values:
      - {type: scfe_regularization, alpha: -0.1}
      - {type: scfe_regularization, alpha: -0.5}
      - {type: scfe_regularization, alpha: -1}
      - {type: normal, alpha: 0.00001}
      - {type: l1normal, alpha: 0.1}
      - {type: l1normal, alpha: 0.5}
      - {type: l1normal, alpha: 1}
      - {type: l2normal, alpha: 0.1}
      - {type: l2normal, alpha: 0.5}
      - {type: l2normal, alpha: 1}
  estimator:
    values:
      - {reg_coef: 0.1}
      - {reg_coef: 1.0}
  model:
    values:
      - {model_type: BMLP, hidden_layers: [1000, 100, 10], dropout: 0.0, single_output: True}
      - {model_type: BMLP, hidden_layers: [100, 30], dropout: 0.0, single_output: True}
  preprocessor:
    values:
      - {poly_features_degree: 1, resample: 1}
