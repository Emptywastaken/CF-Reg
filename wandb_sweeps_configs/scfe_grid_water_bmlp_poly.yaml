method: grid
name: WATER_LogReg_SCFE
metric:
  goal: maximize
  name: validation/accuracy
parameters:
  loss:
    values:
      - {type: scfe_regularization, alpha: 1}
  estimator:
    values:
      - {reg_coef: 0.1}
  model:
    values:
      - {model_type: BMLP, hidden_layers: [100, 30], dropout: 0.0, single_output: True}
  preprocessor:
    values:
      - {poly_features_degree: 1, resample: 1}
      - {poly_features_degree: 6, resample: 1}
